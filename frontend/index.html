<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help Me Bunk - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 2rem;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .login-container h1 {
            text-align: center;
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toggle-form {
            text-align: center;
            margin-top: 1rem;
            color: #666;
        }

        .toggle-form button {
            background: none;
            color: #667eea;
            padding: 0;
            text-decoration: underline;
            font-size: 0.9rem;
        }

        .error {
            color: #e74c3c;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: #fee;
            border-radius: 5px;
            display: none;
        }

        .success {
            color: #27ae60;
            margin-bottom: 1rem;
            padding: 0.75rem;
            background: #efe;
            border-radius: 5px;
            display: none;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h1>Help Me Bunk</h1>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <div class="loading" id="loading">Loading...</div>

        <form id="authForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" id="submitBtn">Login</button>
        </form>

        <div class="toggle-form">
            New here? <button type="button" id="toggleBtn">Create account</button>
        </div>
    </div>

    <script type="module">
        import apiClient from './src/api.js';

        let isLogin = true;
        const form = document.getElementById('authForm');
        const submitBtn = document.getElementById('submitBtn');
        const toggleBtn = document.getElementById('toggleBtn');
        const errorDiv = document.getElementById('error');
        const successDiv = document.getElementById('success');
        const loadingDiv = document.getElementById('loading');

        toggleBtn.addEventListener('click', () => {
            isLogin = !isLogin;
            submitBtn.textContent = isLogin ? 'Login' : 'Sign Up';
            toggleBtn.textContent = isLogin ? 'Create account' : 'Already have account?';
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            loadingDiv.style.display = 'block';
            submitBtn.disabled = true;

            try {
                let result;
                if (isLogin) {
                    result = await apiClient.login(username, password);
                } else {
                    result = await apiClient.register(username, password);
                }

                if (result.success || result.user) {
                    successDiv.textContent = isLogin ? 'Login successful!' : 'Account created!';
                    successDiv.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = result.message || 'Error occurred';
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                errorDiv.textContent = error.message || 'Connection error';
                errorDiv.style.display = 'block';
            } finally {
                loadingDiv.style.display = 'none';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
