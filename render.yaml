services:
  - type: web
    name: attendance-api
    runtime: python-3.11
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --workers 2 --worker-class sync --timeout 120
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: MONGODB_URI
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://your-vercel-app.vercel.app
